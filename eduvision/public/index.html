<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>EduVision Live</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #050508; --surface: #0f0f15; --surface2: #181820;
  --border: rgba(255,255,255,0.08); --accent: #00f5a0; --accent2: #00c8f5;
  --danger: #ff4757; --warn: #ffa502; --hindi: #ff9933;
  --text: #f0f0f5; --muted: #6b6b80; --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
body::after { content: ''; position: fixed; inset: 0; z-index: 9999; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; }
#app { display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
#camera-section { position: relative; flex-shrink: 0; width: 100%; background: #000; overflow: hidden; }
#video-feed { width: 100%; height: 100%; object-fit: cover; display: block; }
#canvas-hidden { display: none; }
#viewfinder { position: absolute; inset: 0; pointer-events: none; }
.vf-corner { position: absolute; width: 50px; height: 50px; border-color: var(--accent); border-style: solid; opacity: 0.7; transition: all 0.3s; }
.vf-tl { top: 20px; left: 20px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.vf-tr { top: 20px; right: 20px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.vf-bl { bottom: 20px; left: 20px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.vf-br { bottom: 20px; right: 20px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
#scan-line { position: absolute; left: 20px; right: 20px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); box-shadow: 0 0 12px var(--accent); animation: scan 2.5s ease-in-out infinite; opacity: 0; transition: opacity 0.3s; }
@keyframes scan { 0%{top:20px} 50%{top:calc(100% - 22px)} 100%{top:20px} }
#viewfinder.active #scan-line { opacity: 1; }
#viewfinder.active .vf-corner { opacity: 1; }
#viewfinder.locked .vf-corner { border-color: var(--warn); box-shadow: 0 0 10px var(--warn); }
#viewfinder.found  .vf-corner { border-color: var(--accent2); box-shadow: 0 0 16px var(--accent2); }
#status-bar { position: absolute; top: 0; left: 0; right: 0; padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); z-index: 10; gap: 8px; }
.logo-mark { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.06em; color: var(--accent); text-shadow: 0 0 20px rgba(0,245,160,0.4); flex-shrink: 0; }
#mode-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; border: 1px solid var(--accent); color: var(--accent); background: rgba(0,245,160,0.08); transition: all 0.3s; }
#mode-badge.scanning { border-color: var(--warn); color: var(--warn); background: rgba(255,165,2,0.1); }
#mode-badge.found { border-color: var(--accent2); color: var(--accent2); background: rgba(0,200,245,0.1); }

/* ── LANGUAGE TOGGLE ── */
#lang-toggle { display: flex; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 100px; padding: 3px; backdrop-filter: blur(8px); flex-shrink: 0; }
.lang-btn { padding: 5px 12px; border-radius: 100px; border: none; background: transparent; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; color: var(--muted); }
.lang-btn.active-en { background: var(--accent2); color: #000; }
.lang-btn.active-hi { background: var(--hindi); color: #000; }

#cam-switch { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; backdrop-filter: blur(8px); flex-shrink: 0; }
#flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.08s; }
#flash.pop { opacity: 0.35; }
#bottom-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-height: 0; }
#controls { display: flex; align-items: center; gap: 12px; padding: 14px 16px 10px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
#auto-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.toggle-track { width: 42px; height: 24px; background: var(--surface2); border-radius: 100px; border: 1.5px solid var(--border); position: relative; transition: all 0.25s; flex-shrink: 0; }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: var(--muted); border-radius: 50%; transition: all 0.25s; }
.toggle-track.on { background: rgba(0,245,160,0.15); border-color: var(--accent); }
.toggle-track.on .toggle-thumb { transform: translateX(18px); background: var(--accent); }
.toggle-label { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.toggle-track.on ~ .toggle-label { color: var(--accent); }
#interval-select { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; padding: 5px 10px; outline: none; cursor: pointer; }
#snap-btn { padding: 8px 16px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 100px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
#snap-btn:hover { border-color: var(--accent2); color: var(--accent2); }
#content-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px; }
#idle-hint { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; gap: 12px; text-align: center; color: var(--muted); min-height: 200px; }
.idle-icon { font-size: 2.5rem; opacity: 0.4; }
.idle-text { font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.7; }
#scanning-state { display: none; padding: 24px 16px; align-items: center; gap: 14px; }
.pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--warn); flex-shrink: 0; animation: pdot 1s ease-in-out infinite; }
@keyframes pdot { 0%{box-shadow:0 0 0 0 rgba(255,165,2,.5)} 70%{box-shadow:0 0 0 10px rgba(255,165,2,0)} 100%{box-shadow:0 0 0 0 rgba(255,165,2,0)} }
.scanning-text { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--warn); letter-spacing: 0.06em; }
#result-card { display: none; flex-direction: column; }
#concept-strip { padding: 14px 16px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
.concept-icon { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, rgba(0,245,160,0.15), rgba(0,200,245,0.15)); border: 1px solid rgba(0,245,160,0.25); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
.concept-info { flex: 1; min-width: 0; }
#concept-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.04em; color: var(--accent2); line-height: 1; margin-bottom: 4px; }
#concept-subject { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.conf-pill { padding: 3px 10px; border-radius: 100px; font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; background: rgba(0,245,160,0.1); border: 1px solid rgba(0,245,160,0.25); color: var(--accent); flex-shrink: 0; align-self: flex-start; }
#concept-desc { padding: 10px 16px 12px; font-size: 0.82rem; color: #aaaabc; line-height: 1.65; border-bottom: 1px solid var(--border); }

/* LANG INDICATOR */
#lang-indicator { display: flex; align-items: center; gap: 8px; padding: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); }
#lang-indicator.hi { background: rgba(255,153,51,0.08); color: var(--hindi); border-color: rgba(255,153,51,0.2); }
#lang-indicator.en { background: rgba(0,200,245,0.06); color: var(--accent2); border-color: rgba(0,200,245,0.15); }
#lang-indicator::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

#video-section { padding: 12px 16px; }
#video-label { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
#video-label::before { content: ''; width: 6px; height: 6px; background: var(--danger); border-radius: 50%; animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
#yt-wrap { border-radius: 12px; overflow: hidden; position: relative; padding-bottom: 56.25%; background: #000; border: 1px solid var(--border); margin-bottom: 10px; }
#yt-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
#video-title-display { font-weight: 600; font-size: 0.85rem; color: var(--text); margin-bottom: 2px; }
#video-channel-display { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); }
#alt-section { padding: 12px 16px 0; }
.alt-row-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
#alt-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
#alt-row::-webkit-scrollbar { display: none; }
.alt-chip { flex-shrink: 0; width: 140px; border-radius: 10px; overflow: hidden; border: 1.5px solid var(--border); cursor: pointer; transition: all 0.2s; background: var(--surface2); }
.alt-chip:hover { border-color: var(--accent2); transform: scale(1.02); }
.alt-chip img { width: 100%; height: 78px; object-fit: cover; display: block; }
.alt-chip-label { padding: 6px 8px; font-size: 0.7rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#topics-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px 4px; }
.topic-chip { padding: 3px 10px; border-radius: 100px; background: var(--surface2); border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); }
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 100px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; white-space: nowrap; transition: transform 0.3s; z-index: 9990; backdrop-filter: blur(12px); }
#toast.show { transform: translateX(-50%) translateY(0); }
@media (min-width: 640px) { #app{flex-direction:row} #camera-section{flex:0 0 40%;height:100%} #video-feed{height:100%} #bottom-panel{flex:1} }
@media (max-width: 639px) { #camera-section{height:42vh} }
#cam-error { display:none; position:absolute; inset:0; background:rgba(5,5,8,0.95); align-items:center; justify-content:center; flex-direction:column; gap:12px; text-align:center; padding:24px; z-index:50; }
#cam-error.show { display:flex; }
#cam-off-overlay { display:none; position:absolute; inset:0; background:rgba(5,5,8,0.92); align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:40; backdrop-filter:blur(4px); }
#cam-off-overlay.show { display:flex; }
#cam-off-overlay .cam-off-icon { font-size:2.8rem; opacity:0.5; }
#cam-off-overlay .cam-off-label { font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
#scan-again-btn { padding:10px 22px; background:var(--accent); color:#000; border:none; border-radius:100px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; transition:all 0.2s; box-shadow:0 0 20px rgba(0,245,160,0.3); }
#scan-again-btn:hover { transform:scale(1.04); box-shadow:0 0 28px rgba(0,245,160,0.5); }
#cam-error p { font-size:0.82rem; color:var(--muted); line-height:1.6; }
</style>
</head>
<body>
<div id="app">
  <div id="camera-section">
    <video id="video-feed" autoplay playsinline muted></video>
    <canvas id="canvas-hidden"></canvas>
    <div id="status-bar">
      <div class="logo-mark">EduVision</div>
      <div id="mode-badge">READY</div>
      <div id="lang-toggle">
        <button class="lang-btn active-en" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btn-hi" onclick="setLang('hi')">हिंदी</button>
      </div>
      <button id="cam-switch" onclick="switchCamera()">🔄</button>
    </div>
    <div id="viewfinder">
      <div class="vf-corner vf-tl"></div><div class="vf-corner vf-tr"></div>
      <div class="vf-corner vf-bl"></div><div class="vf-corner vf-br"></div>
      <div id="scan-line"></div>
    </div>
    <div id="flash"></div>
    <div id="cam-error"><div style="font-size:2.5rem">📷</div><p>Camera access denied.<br/>Allow permission and refresh.</p></div>
    <div id="cam-off-overlay">
      <div class="cam-off-icon">📷</div>
      <div class="cam-off-label">Camera paused</div>
      <button id="scan-again-btn" onclick="resumeCamera()">🔍 Scan Again</button>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="controls">
      <div id="auto-toggle" onclick="toggleAuto()">
        <div class="toggle-track" id="track"><div class="toggle-thumb"></div></div>
        <span class="toggle-label">Auto Scan</span>
      </div>
      <select id="interval-select" onchange="updateInterval()">
        <option value="4000">4s</option><option value="6000" selected>6s</option>
        <option value="10000">10s</option><option value="15000">15s</option>
      </select>
      <button id="snap-btn" onclick="captureNow()">📸 Snap</button>
    </div>
    <div id="content-area">
      <div id="idle-hint">
        <div class="idle-icon">🔭</div>
        <div class="idle-text">Point camera at<br/>an educational object<br/>tap Snap or enable Auto Scan</div>
      </div>
      <div id="scanning-state"><div class="pulse-dot"></div><div class="scanning-text">Analyzing with AI…</div></div>
      <div id="result-card">
        <div id="concept-strip">
          <div class="concept-icon" id="concept-emoji">📚</div>
          <div class="concept-info">
            <div id="concept-name">—</div>
            <div id="concept-subject">—</div>
          </div>
          <div class="conf-pill" id="conf-pill">—%</div>
        </div>
        <div id="concept-desc"></div>
        <div id="topics-row"></div>
        <div id="lang-indicator" class="en">ENGLISH VIDEOS</div>
        <div id="video-section">
          <div id="video-label">Now Playing</div>
          <div id="yt-wrap"><iframe id="yt-iframe" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe></div>
          <div id="video-title-display"></div>
          <div id="video-channel-display"></div>
        </div>
        <div id="alt-section">
          <div class="alt-row-label">More on this topic</div>
          <div id="alt-row"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let stream = null, facingMode = 'environment';
let autoScanOn = false, autoInterval = null, intervalMs = 6000;
let analyzing = false, lastConcept = '', currentVideoSet = null, currentSubject = '';
let currentLang = localStorage.getItem('ev_lang') || 'en';

// ══════════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════════
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('ev_lang', lang);
  const btnEn = document.getElementById('btn-en');
  const btnHi = document.getElementById('btn-hi');
  btnEn.className = 'lang-btn' + (lang === 'en' ? ' active-en' : '');
  btnHi.className = 'lang-btn' + (lang === 'hi' ? ' active-hi' : '');
  updateLangIndicator();
  if (currentVideoSet && lastConcept) {
    loadVideos(currentVideoSet, true);
    toast(lang === 'hi' ? '🇮🇳 हिंदी वीडियो' : '🇬🇧 English Videos');
  }
}

function updateLangIndicator() {
  const el = document.getElementById('lang-indicator');
  if (currentLang === 'hi') { el.textContent = 'हिंदी वीडियो चल रहे हैं'; el.className = 'hi'; }
  else { el.textContent = 'ENGLISH VIDEOS'; el.className = 'en'; }
}

// ── DYNAMIC VIDEO LOADER via YouTube Data API ──────────────────────────────
async function loadVideos(topic, autoplay = false) {
  currentVideoSet = topic;

  // Show loading state
  document.getElementById('yt-iframe').src = '';
  document.getElementById('video-title-display').textContent = 'Searching YouTube…';
  document.getElementById('video-channel-display').textContent = '';
  document.getElementById('alt-row').innerHTML = '<div style="color:var(--muted);font-family:JetBrains Mono,monospace;font-size:0.7rem;padding:8px">Loading videos…</div>';

  try {
    const res = await fetch(`/api/youtube?topic=${encodeURIComponent(topic)}&subject=${encodeURIComponent(currentSubject||'')}&lang=${currentLang}`);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'YouTube search failed');
    }

    const data = await res.json();
    const videos = data.videos;

    if (!videos || videos.length === 0) {
      throw new Error('No videos found');
    }

    // Play primary video
    const primary = videos[0];
    document.getElementById('yt-iframe').src =
      `https://www.youtube.com/embed/${primary.id}?autoplay=${autoplay?1:0}&rel=0&modestbranding=1`;
    document.getElementById('video-title-display').textContent = primary.title;
    document.getElementById('video-channel-display').textContent = '▶ ' + primary.channel;

    // Show alternate videos
    const altRow = document.getElementById('alt-row');
    altRow.innerHTML = '';
    videos.slice(1).forEach(v => {
      const chip = document.createElement('div'); chip.className = 'alt-chip';
      chip.innerHTML = `<img src="${v.thumb}" loading="lazy"/><div class="alt-chip-label">${v.title}</div>`;
      chip.onclick = () => {
        document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0`;
        document.getElementById('video-title-display').textContent = v.title;
        document.getElementById('video-channel-display').textContent = '▶ ' + v.channel;
      };
      altRow.appendChild(chip);
    });

  } catch(err) {
    document.getElementById('video-title-display').textContent = '⚠️ ' + err.message;
    document.getElementById('alt-row').innerHTML = '';
    toast('❌ Video search failed: ' + err.message);
  }
}

// ══════════════════════════════════════════════
// STARTUP
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => { setLang(currentLang); startCamera(); });

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode, width:{ideal:1280}, height:{ideal:720} }, audio: false });
    const vid = document.getElementById('video-feed');
    vid.srcObject = stream;
    vid.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    document.getElementById('cam-error').classList.remove('show');
    document.getElementById('cam-off-overlay').classList.remove('show');
  } catch(e) { document.getElementById('cam-error').classList.add('show'); }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const vid = document.getElementById('video-feed');
  vid.srcObject = null;
  // stop auto-scan while camera is off
  if (autoScanOn) {
    autoScanOn = false;
    document.getElementById('track').classList.remove('on');
    clearInterval(autoInterval); autoInterval = null;
    const vf = document.getElementById('viewfinder'), badge = document.getElementById('mode-badge');
    vf.classList.remove('active','locked','found'); badge.textContent='READY'; badge.className='';
  }
  document.getElementById('cam-off-overlay').classList.add('show');
}

async function resumeCamera() {
  lastConcept = '';   // allow re-detection of the same object after resuming
  document.getElementById('idle-hint').style.display = 'flex';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('yt-iframe').src = ''; // stop video playback
  await startCamera();
}

async function switchCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
  toast(facingMode === 'user' ? 'Front camera' : 'Rear camera');
}

function toggleAuto() {
  autoScanOn = !autoScanOn;
  document.getElementById('track').classList.toggle('on', autoScanOn);
  const vf = document.getElementById('viewfinder'), badge = document.getElementById('mode-badge');
  if (autoScanOn) { vf.classList.add('active'); badge.textContent='AUTO SCAN'; badge.className='scanning'; autoInterval=setInterval(captureNow,intervalMs); toast('🔄 Auto scan on'); }
  else { vf.classList.remove('active','locked','found'); badge.textContent='READY'; badge.className=''; clearInterval(autoInterval); autoInterval=null; toast('⏸ Auto scan off'); }
}

function updateInterval() {
  intervalMs = parseInt(document.getElementById('interval-select').value);
  if (autoScanOn) { clearInterval(autoInterval); autoInterval=setInterval(captureNow,intervalMs); }
}

async function captureNow() {
  if (analyzing) return;
  const vid = document.getElementById('video-feed');
  if (!vid.videoWidth) return;
  const flash = document.getElementById('flash');
  flash.classList.add('pop'); setTimeout(()=>flash.classList.remove('pop'),120);
  const canvas = document.getElementById('canvas-hidden');
  canvas.width=vid.videoWidth; canvas.height=vid.videoHeight;
  const ctx=canvas.getContext('2d');
  if (facingMode==='user'){ctx.translate(canvas.width,0);ctx.scale(-1,1);}
  ctx.drawImage(vid,0,0);
  await analyzeFrame(canvas.toDataURL('image/jpeg',0.75).split(',')[1]);
}

async function analyzeFrame(base64) {
  analyzing=true; setScanning(true);
  const vf=document.getElementById('viewfinder'), badge=document.getElementById('mode-badge');
  vf.classList.add('locked'); badge.textContent='SCANNING…'; badge.className='scanning';
  try {
    const res = await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:base64,mediaType:'image/jpeg'})});
    if(res.status===429){toast('⏱ Rate limit — slow down');return;}
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||'Server error');}
    const parsed=await res.json();
    if(!parsed.has_educational_content||parsed.confidence<0.45){
  vf.classList.remove('locked','found');
  badge.textContent=autoScanOn?'AUTO SCAN':'READY';
  badge.className=autoScanOn?'scanning':'';
  toast('🤔 Fun Object Not Recognized');
  document.getElementById('concept-emoji').textContent='🎬';
  document.getElementById('concept-name').textContent='Fun Object!';
  document.getElementById('concept-subject').textContent='Not Recognized';
  document.getElementById('conf-pill').textContent='—';
  document.getElementById('concept-desc').textContent='This object was not recognized. Here is an interesting video for you!';
  document.getElementById('topics-row').innerHTML='';
  document.getElementById('lang-indicator').textContent=currentLang==='hi'?'हिंदी वीडियो चल रहे हैं':'ENGLISH VIDEOS';
  document.getElementById('lang-indicator').className=currentLang==='hi'?'hi':'en';
  document.getElementById('yt-iframe').src='https://www.youtube.com/embed/Mu1jTUjMit4?autoplay=1&rel=0&modestbranding=1';
  document.getElementById('video-title-display').textContent='Science and Fun';
  document.getElementById('video-channel-display').textContent='▶ Science and Fun Motivation';
  document.getElementById('alt-row').innerHTML='';
  document.getElementById('idle-hint').style.display='none';
  document.getElementById('scanning-state').style.display='none';
  document.getElementById('result-card').style.display='flex';
  document.getElementById('result-card').style.flexDirection='column';
  stopCamera();
} else {
      const concept=(parsed.concept||'').toLowerCase();
      vf.classList.remove('locked'); vf.classList.add('found'); badge.textContent='FOUND!'; badge.className='found';
      setTimeout(()=>{vf.classList.remove('found');badge.textContent='READY';badge.className='';},1800);
      if(concept!==lastConcept){lastConcept=concept;showResult(parsed);}
      else toast('📌 Same concept — video still playing');
      stopCamera();
    }
  } catch(err){
    toast('❌ '+err.message);
    vf.classList.remove('locked','found'); badge.textContent=autoScanOn?'AUTO SCAN':'READY'; badge.className=autoScanOn?'scanning':'';
  } finally { setScanning(false); analyzing=false; }
}

function setScanning(on){
  document.getElementById('idle-hint').style.display=(!on&&!lastConcept)?'flex':'none';
  document.getElementById('scanning-state').style.display=on?'flex':'none';
  document.getElementById('result-card').style.display=(!on&&lastConcept)?'flex':'none';
  if(!on&&lastConcept)document.getElementById('result-card').style.flexDirection='column';
}

function showResult(data){
  const concept=(data.concept||'').toLowerCase();
  const displayName = data.display_name || data.concept;

  // Find emoji from VIDEO_DB if available, otherwise default
  let emoji = '📚';
  for(const key of Object.keys(VIDEO_DB)){
    if(key==='default')continue;
    if(concept.includes(key)||key.includes(concept)||concept.replace(/\s+/g,'').includes(key.replace(/\s+/g,''))){
      emoji = VIDEO_DB[key].emoji || '📚';
      break;
    }
  }

  document.getElementById('concept-emoji').textContent = emoji;
  document.getElementById('concept-name').textContent  = displayName;
  document.getElementById('concept-subject').textContent = data.subject || '';
  document.getElementById('conf-pill').textContent = Math.round((data.confidence||0.9)*100)+'%';
  document.getElementById('concept-desc').textContent = data.description || '';

  // Store subject so loadVideos can use it for more specific YouTube search
  currentSubject = data.subject || '';

  const topicsEl=document.getElementById('topics-row'); topicsEl.innerHTML='';
  (data.related_topics||[]).slice(0,4).forEach(t=>{
    const c=document.createElement('div'); c.className='topic-chip'; c.textContent=t; topicsEl.appendChild(c);
  });

  updateLangIndicator();

  // Pass the concept string — YouTube API will search for it dynamically
  loadVideos(displayName, true);

  document.getElementById('idle-hint').style.display='none';
  document.getElementById('scanning-state').style.display='none';
  document.getElementById('result-card').style.display='flex';
  document.getElementById('result-card').style.flexDirection='column';
  toast('✅ '+displayName+' detected!');
}

let toastTimer;
function toast(msg){
  clearTimeout(toastTimer);
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
